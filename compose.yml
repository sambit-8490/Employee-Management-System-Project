version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: employee-server
    restart: always
    ports:
      - "5200:5200"
    depends_on:
      - mongo
    env_file:
      - ./server/.env

  client:
    build: ./client
    container_name: employee-client
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo-data:
